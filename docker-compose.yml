services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: idc_app
    ports:
      - "8080:80"

    volumes:
      - .:/var/www/html

    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: idc_db
    restart: always
    environment:
      MYSQL_DATABASE: idc
      MYSQL_USER: idcuser
      MYSQL_PASSWORD: StrongPass123
      MYSQL_ROOT_PASSWORD: RootStrongPass123
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
